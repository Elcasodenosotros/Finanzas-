<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Finanzas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f0f; color: #f0ede6; font-family: Georgia, serif; padding: 16px; max-width: 500px; margin: 0 auto; }

    .sub { font-size: 10px; letter-spacing: 4px; color: #555; text-transform: uppercase; margin-top: 20px; }
    h1 { font-size: 22px; font-weight: 400; margin-bottom: 16px; }

    .balances { display: flex; gap: 8px; margin-bottom: 16px; }
    .bal { flex: 1; background: #1a1a1a; border: 1px solid #222; border-radius: 12px; padding: 10px; }
    .bal .name { font-size: 10px; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
    .bal .rows { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 4px; }
    .bal .total { font-size: 14px; font-weight: 300; border-top: 1px solid #222; padding-top: 5px; }

    .vista-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
    .vista-tabs button { padding: 6px 14px; border-radius: 20px; border: 1px solid #222; background: transparent; color: #555; font-size: 11px; cursor: pointer; font-family: Georgia, serif; letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s; }
    .vista-tabs button.on { border-color: #f39c12; background: #f39c1215; color: #f39c12; }

    .card { background: #1a1a1a; border: 1px solid #222; border-radius: 14px; padding: 16px; margin-bottom: 14px; }

    .toggle { display: flex; border-radius: 8px; overflow: hidden; border: 1px solid #222; margin-bottom: 14px; }
    .toggle button { flex: 1; padding: 11px; border: none; background: transparent; color: #555; cursor: pointer; font-size: 13px; font-family: Georgia, serif; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .toggle button.gasto   { background: #e74c3c15; color: #e74c3c; border-bottom-color: #e74c3c; }
    .toggle button.ingreso { background: #2ecc7115; color: #2ecc71; border-bottom-color: #2ecc71; }

    input[type=number], input[type=text], select {
      width: 100%; padding: 11px 14px; background: #111; border: 1px solid #222;
      border-radius: 9px; color: #f0ede6; font-size: 15px; font-family: Georgia, serif;
      margin-bottom: 10px; outline: none;
    }

    .monedas { display: flex; gap: 8px; margin-bottom: 12px; }
    .monedas button { flex: 1; padding: 10px; border: 1px solid #222; border-radius: 9px; background: transparent; color: #555; cursor: pointer; font-size: 13px; font-family: Georgia, serif; transition: all 0.2s; }
    .monedas button.sel { border-color: #f39c12; color: #f39c12; background: #f39c1215; }

    .cats { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 12px; }
    .cats button { padding: 6px 12px; border-radius: 20px; border: 1px solid #222; background: transparent; color: #555; font-size: 12px; cursor: pointer; font-family: Georgia, serif; transition: all 0.2s; }

    .submit { width: 100%; padding: 12px; border: none; border-radius: 9px; font-family: Georgia, serif; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }

    .filters { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .filters button { padding: 5px 12px; border-radius: 20px; border: 1px solid #222; background: transparent; color: #555; font-size: 11px; cursor: pointer; font-family: Georgia, serif; transition: all 0.2s; }
    .filters button.on { border-color: #f39c12; color: #f39c12; }

    .mes-select { margin-bottom: 12px; }

    .mov { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1e1e1e; }
    .mov:last-child { border-bottom: none; }
    .mov .desc { font-size: 13px; color: #ccc; }
    .mov .meta { font-size: 10px; color: #444; margin-top: 2px; }
    .mov .monto { font-size: 15px; font-weight: 300; }
    .mov .del { background: none; border: none; color: #333; cursor: pointer; font-size: 18px; line-height: 1; margin-left: 8px; }
    .mov .del:hover { color: #e74c3c; }

    .res-section { margin-bottom: 20px; }
    .res-title { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }
    .res-item { background: #111; border: 1px solid #1e1e1e; border-radius: 10px; padding: 12px; margin-bottom: 7px; }
    .res-row { display: flex; justify-content: space-between; font-size: 13px; color: #ccc; margin-bottom: 7px; }
    .res-amounts { display: flex; gap: 10px; font-size: 12px; }
    .bar-bg { height: 3px; background: #222; border-radius: 2px; }
    .bar-fill { height: 100%; border-radius: 2px; }

    .empty { text-align: center; color: #333; padding: 30px 0; font-size: 13px; }
  </style>
</head>
<body>

  <div class="sub">Control de</div>
  <h1>💰 Mis Finanzas</h1>

  <div class="balances">
    <div class="bal">
      <div class="name">Pesos</div>
      <div class="rows">
        <span style="color:#2ecc71">▲ <span id="ing-ars">$0</span></span>
        <span style="color:#e74c3c">▼ <span id="egr-ars">$0</span></span>
      </div>
      <div class="total" id="bal-ars" style="color:#2ecc71">+$0</div>
    </div>
    <div class="bal">
      <div class="name">Dólares</div>
      <div class="rows">
        <span style="color:#2ecc71">▲ <span id="ing-usd">u$s0</span></span>
        <span style="color:#e74c3c">▼ <span id="egr-usd">u$s0</span></span>
      </div>
      <div class="total" id="bal-usd" style="color:#2ecc71">+u$s0</div>
    </div>
  </div>

  <div class="vista-tabs">
    <button id="v-lista" class="on" onclick="setVista('lista')">Lista</button>
    <button id="v-resumen" onclick="setVista('resumen')">Resumen</button>
  </div>

  <div class="card">
    <div class="toggle">
      <button id="btn-gasto" class="gasto" onclick="setTipo('gasto')">− Gasto</button>
      <button id="btn-ingreso" onclick="setTipo('ingreso')">+ Ingreso</button>
    </div>

    <input type="number" id="monto" placeholder="Monto" inputmode="decimal" onkeydown="if(event.key==='Enter')agregar()">

    <div class="monedas">
      <button id="btn-ars" class="sel" onclick="setMon('ARS')">$ Pesos</button>
      <button id="btn-usd" onclick="setMon('USD')">u$s Dólares</button>
    </div>

    <div class="cats" id="cats"></div>

    <input type="text" id="desc" placeholder="Descripción (opcional)" onkeydown="if(event.key==='Enter')agregar()">

    <button class="submit" id="submit" style="background:#e74c3c;color:#fff" onclick="agregar()">− Agregar gasto</button>
  </div>

  <div id="sec-lista">
    <div class="card">
      <div class="filters">
        <button id="f-all" class="on" onclick="setFiltro('all')">Todos</button>
        <button id="f-ars" onclick="setFiltro('ARS')">Pesos</button>
        <button id="f-usd" onclick="setFiltro('USD')">Dólares</button>
      </div>
      <div class="mes-select">
        <select id="mes-lista" onchange="renderLista()">
          <option value="all">Todos los meses</option>
        </select>
      </div>
      <div id="lista"><div class="empty">Sin movimientos aún</div></div>
    </div>
  </div>

  <div id="sec-resumen" style="display:none">
    <div class="card">
      <div class="mes-select">
        <select id="mes-resumen" onchange="renderResumen()">
          <option value="all">Todos los meses</option>
        </select>
      </div>
      <div id="res-content"><div class="empty">Sin movimientos aún</div></div>
    </div>
  </div>

  <script>
    var GASTO_CATS = [
      { id:'comida',      label:'🍽️ Comida',      color:'#e8b86d' },
      { id:'auto',        label:'🚗 Auto',         color:'#7eb8d4' },
      { id:'publicidad',  label:'📣 Publicidad',   color:'#e74c3c' },
      { id:'inversion',   label:'📈 Inversión',    color:'#2ecc71' },
      { id:'facultad',    label:'🎓 Facultad',     color:'#b07ed4' },
      { id:'alquiler',    label:'🏠 Alquiler',     color:'#d47e7e' },
      { id:'salud',       label:'💊 Salud',        color:'#7ed4a0' },
      { id:'ocio',        label:'🎬 Ocio',         color:'#f39c12' },
      { id:'suscripciones', label:'📱 Suscripciones', color:'#a0a0a0' },
      { id:'otros',       label:'📦 Otros',        color:'#666' },
    ];
    var INGRESO_CATS = [
      { id:'sueldo',    label:'💼 Sueldo',    color:'#2ecc71' },
      { id:'freelance', label:'💻 Freelance', color:'#7eb8d4' },
      { id:'inversion', label:'📈 Inversión', color:'#e8b86d' },
      { id:'regalo',    label:'🎁 Regalo',    color:'#b07ed4' },
      { id:'otro_ing',  label:'➕ Otro',      color:'#a0a0a0' },
    ];

    var CURRENCIES = {
      ARS: { sym: '$',   label: 'Pesos' },
      USD: { sym: 'u$s', label: 'Dólares' },
    };

    var movs = JSON.parse(localStorage.getItem('finanzas_v3') || '[]');
    var tipo = 'gasto', mon = 'ARS', cat = 'comida', filtro = 'all', vista = 'lista';

    function save() { localStorage.setItem('finanzas_v3', JSON.stringify(movs)); }

    function fmt(n, cur) {
      var sym = CURRENCIES[cur] ? CURRENCIES[cur].sym : '$';
      return sym + Number(n).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function getMesKey(fecha) {
      // fecha is like "1/4/2026"
      var parts = fecha.split('/');
      if (parts.length === 3) return parts[2] + '-' + parts[1].padStart(2,'0');
      return fecha;
    }

    function getMesLabel(key) {
      var meses = ['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
      var parts = key.split('-');
      return meses[parseInt(parts[1])] + ' ' + parts[0];
    }

    function getMeses() {
      var keys = {};
      movs.forEach(function(m) { keys[getMesKey(m.fecha)] = true; });
      return Object.keys(keys).sort().reverse();
    }

    function updateMesSelects() {
      var meses = getMeses();
      ['mes-lista','mes-resumen'].forEach(function(id) {
        var sel = document.getElementById(id);
        var cur = sel.value;
        sel.innerHTML = '<option value="all">Todos los meses</option>'
          + meses.map(function(k) { return '<option value="'+k+'">'+getMesLabel(k)+'</option>'; }).join('');
        sel.value = cur;
      });
    }

    function filterByMes(data, mesKey) {
      if (mesKey === 'all') return data;
      return data.filter(function(m) { return getMesKey(m.fecha) === mesKey; });
    }

    function setTipo(t) {
      tipo = t;
      cat = t === 'gasto' ? 'comida' : 'sueldo';
      document.getElementById('btn-gasto').className   = t==='gasto'   ? 'gasto'   : '';
      document.getElementById('btn-ingreso').className = t==='ingreso' ? 'ingreso' : '';
      var btn = document.getElementById('submit');
      btn.style.background = t==='gasto' ? '#e74c3c' : '#2ecc71';
      btn.style.color = '#fff';
      btn.textContent = t==='gasto' ? '− Agregar gasto' : '+ Agregar ingreso';
      renderCats();
    }

    function setMon(m) {
      mon = m;
      document.getElementById('btn-ars').className = m==='ARS' ? 'sel' : '';
      document.getElementById('btn-usd').className = m==='USD' ? 'sel' : '';
    }

    function setCat(id) { cat = id; renderCats(); }

    function renderCats() {
      var cats = tipo==='gasto' ? GASTO_CATS : INGRESO_CATS;
      document.getElementById('cats').innerHTML = cats.map(function(c) {
        var active = c.id === cat;
        return '<button onclick="setCat(\''+c.id+'\')" style="'
          +'border-color:'+(active?c.color:'#222')+';'
          +'background:'+(active?c.color+'20':'transparent')+';'
          +'color:'+(active?c.color:'#555')+';">'
          +c.label+'</button>';
      }).join('');
    }

    function setFiltro(f) {
      filtro = f;
      ['all','ARS','USD'].forEach(function(x) {
        document.getElementById('f-'+x.toLowerCase().replace('usd','usd').replace('ars','ars')).className = x===f?'on':'';
      });
      document.getElementById('f-all').className = f==='all'?'on':'';
      document.getElementById('f-ars').className = f==='ARS'?'on':'';
      document.getElementById('f-usd').className = f==='USD'?'on':'';
      renderLista();
    }

    function setVista(v) {
      vista = v;
      document.getElementById('v-lista').className   = v==='lista'   ? 'on' : '';
      document.getElementById('v-resumen').className = v==='resumen' ? 'on' : '';
      document.getElementById('sec-lista').style.display   = v==='lista'   ? 'block' : 'none';
      document.getElementById('sec-resumen').style.display = v==='resumen' ? 'block' : 'none';
    }

    function agregar() {
      var m = parseFloat(document.getElementById('monto').value);
      if (!m || m <= 0) return;
      var d = document.getElementById('desc').value.trim() || (tipo==='gasto'?'Gasto':'Ingreso');
      movs.unshift({ id:Date.now(), tipo:tipo, mon:mon, monto:m, cat:cat, desc:d, fecha:new Date().toLocaleDateString('es-AR') });
      document.getElementById('monto').value = '';
      document.getElementById('desc').value  = '';
      save(); updateMesSelects(); render();
    }

    function del(id) {
      movs = movs.filter(function(m){ return m.id !== id; });
      save(); updateMesSelects(); render();
    }

    function renderBalance() {
      ['ARS','USD'].forEach(function(cur) {
        var ing = movs.filter(function(m){ return m.tipo==='ingreso'&&m.mon===cur; }).reduce(function(s,m){return s+m.monto;},0);
        var egr = movs.filter(function(m){ return m.tipo==='gasto'  &&m.mon===cur; }).reduce(function(s,m){return s+m.monto;},0);
        var bal = ing - egr;
        var c = cur.toLowerCase();
        document.getElementById('ing-'+c).textContent = fmt(ing,cur);
        document.getElementById('egr-'+c).textContent = fmt(egr,cur);
        var el = document.getElementById('bal-'+c);
        el.textContent = (bal>=0?'+':'') + fmt(bal,cur);
        el.style.color = bal>=0 ? '#2ecc71' : '#e74c3c';
      });
    }

    function renderLista() {
      var allCats = GASTO_CATS.concat(INGRESO_CATS);
      var mesKey = document.getElementById('mes-lista').value;
      var data = filtro==='all' ? movs : movs.filter(function(m){ return m.mon===filtro; });
      data = filterByMes(data, mesKey);
      var lista = document.getElementById('lista');
      if (!data.length) { lista.innerHTML='<div class="empty">Sin movimientos aún</div>'; return; }
      lista.innerHTML = data.map(function(m) {
        var c = allCats.find(function(x){ return x.id===m.cat; }) || { label:'📦 Otros', color:'#666' };
        var isI = m.tipo==='ingreso';
        return '<div class="mov" style="border-left:3px solid '+(isI?'#2ecc71':'#e74c3c')+';padding-left:10px">'
          +'<div>'
          +'<div class="desc">'+c.label.split(' ')[0]+' '+m.desc+'</div>'
          +'<div class="meta">'+m.mon+' · '+m.fecha+'</div>'
          +'</div>'
          +'<div style="display:flex;align-items:center">'
          +'<span class="monto" style="color:'+(isI?'#2ecc71':'#e74c3c')+'">'+(isI?'+':'−')+fmt(m.monto,m.mon)+'</span>'
          +'<button class="del" onclick="del('+m.id+')">×</button>'
          +'</div>'
          +'</div>';
      }).join('');
    }

    function renderResumen() {
      var el = document.getElementById('res-content');
      var mesKey = document.getElementById('mes-resumen').value;
      var gastos   = filterByMes(movs.filter(function(m){ return m.tipo==='gasto';   }), mesKey);
      var ingresos = filterByMes(movs.filter(function(m){ return m.tipo==='ingreso'; }), mesKey);

      function buildSection(cats, data, title, titleColor) {
        var rows = cats.map(function(cat) {
          var ars = data.filter(function(m){ return m.cat===cat.id&&m.mon==='ARS'; }).reduce(function(s,m){return s+m.monto;},0);
          var usd = data.filter(function(m){ return m.cat===cat.id&&m.mon==='USD'; }).reduce(function(s,m){return s+m.monto;},0);
          return { cat:cat, ars:ars, usd:usd };
        }).filter(function(r){ return r.ars>0||r.usd>0; });
        if (!rows.length) return '';
        var max = Math.max.apply(null, rows.map(function(r){ return r.ars + r.usd*1200; })) || 1;
        return '<div class="res-section">'
          +'<div class="res-title" style="color:'+titleColor+'">'+title+'</div>'
          +rows.map(function(r) {
            var pct = ((r.ars + r.usd*1200) / max * 100).toFixed(1);
            return '<div class="res-item">'
              +'<div class="res-row"><span>'+r.cat.label+'</span>'
              +'<div class="res-amounts">'
              +(r.ars>0?'<span style="color:#7eb8d4">'+fmt(r.ars,'ARS')+'</span>':'')
              +(r.usd>0?'<span style="color:#e8b86d">'+fmt(r.usd,'USD')+'</span>':'')
              +'</div></div>'
              +'<div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%;background:'+r.cat.color+'"></div></div>'
              +'</div>';
          }).join('')
          +'</div>';
      }

      var html = buildSection(INGRESO_CATS, ingresos, 'Ingresos por categoría', '#2ecc71')
               + buildSection(GASTO_CATS,   gastos,   'Gastos por categoría',   '#e74c3c');
      el.innerHTML = html || '<div class="empty">Sin movimientos aún</div>';
    }

    function render() { renderBalance(); renderLista(); renderResumen(); }

    renderCats();
    updateMesSelects();
    render();
  </script>
</body>
</html>
