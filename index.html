<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Finanzas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f0f; color: #f0ede6; font-family: Georgia, serif; padding: 16px; max-width: 500px; margin: 0 auto; }

```
h1 { font-size: 22px; font-weight: 400; margin: 20px 0 6px; }
.sub { font-size: 10px; letter-spacing: 4px; color: #555; text-transform: uppercase; }

.balances { display: flex; gap: 10px; margin: 16px 0; }
.bal { flex: 1; background: #1a1a1a; border: 1px solid #222; border-radius: 12px; padding: 12px; }
.bal .name { font-size: 10px; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
.bal .rows { font-size: 10px; display: flex; justify-content: space-between; margin-bottom: 5px; }
.bal .total { font-size: 16px; font-weight: 300; border-top: 1px solid #222; padding-top: 6px; }

.card { background: #1a1a1a; border: 1px solid #222; border-radius: 14px; padding: 16px; margin-bottom: 14px; }

.toggle { display: flex; border-radius: 8px; overflow: hidden; border: 1px solid #222; margin-bottom: 14px; }
.toggle button { flex: 1; padding: 11px; border: none; background: transparent; color: #555; cursor: pointer; font-size: 13px; font-family: Georgia, serif; border-bottom: 2px solid transparent; transition: all 0.2s; }
.toggle button.gasto  { background: #c0392b18; color: #e74c3c; border-bottom-color: #e74c3c; }
.toggle button.ingreso { background: #27ae6018; color: #2ecc71; border-bottom-color: #2ecc71; }

input[type=number], input[type=text] {
  width: 100%; padding: 11px 14px; background: #111; border: 1px solid #222;
  border-radius: 9px; color: #f0ede6; font-size: 16px; font-family: Georgia, serif;
  margin-bottom: 10px; outline: none;
}

.monedas { display: flex; gap: 8px; margin-bottom: 10px; }
.monedas button { flex: 1; padding: 10px; border: 1px solid #222; border-radius: 9px; background: transparent; color: #555; cursor: pointer; font-size: 13px; font-family: Georgia, serif; transition: all 0.2s; }
.monedas button.sel { border-color: #f39c12; color: #f39c12; background: #f39c1215; }

.submit { width: 100%; padding: 12px; border: none; border-radius: 9px; font-family: Georgia, serif; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; }
.submit:hover { opacity: 0.85; }

.filters { display: flex; gap: 6px; margin-bottom: 12px; }
.filters button { padding: 5px 14px; border-radius: 20px; border: 1px solid #222; background: transparent; color: #555; font-size: 11px; cursor: pointer; font-family: Georgia, serif; transition: all 0.2s; }
.filters button.on { border-color: #f39c12; color: #f39c12; }

.mov { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1e1e1e; }
.mov:last-child { border-bottom: none; }
.mov .izq .desc { font-size: 13px; color: #ccc; }
.mov .izq .meta { font-size: 10px; color: #444; margin-top: 2px; }
.mov .der { display: flex; align-items: center; gap: 8px; }
.mov .der .monto { font-size: 15px; font-weight: 300; }
.mov .der .del { background: none; border: none; color: #333; cursor: pointer; font-size: 18px; line-height: 1; transition: color 0.2s; }
.mov .der .del:hover { color: #e74c3c; }

.empty { text-align: center; color: #333; padding: 30px 0; font-size: 13px; }

  </style>
</head>
<body>

  <div class="sub">Control de</div>
  <h1>Mis Finanzas</h1>

  <div class="balances">
    <div class="bal">
      <div class="name">Euros</div>
      <div class="rows">
        <span style="color:#2ecc71">▲ <span id="ing-eur">€0,00</span></span>
        <span style="color:#e74c3c">▼ <span id="egr-eur">€0,00</span></span>
      </div>
      <div class="total" id="bal-eur" style="color:#2ecc71">+€0,00</div>
    </div>
    <div class="bal">
      <div class="name">Pesos</div>
      <div class="rows">
        <span style="color:#2ecc71">▲ <span id="ing-ars">$0,00</span></span>
        <span style="color:#e74c3c">▼ <span id="egr-ars">$0,00</span></span>
      </div>
      <div class="total" id="bal-ars" style="color:#2ecc71">+$0,00</div>
    </div>
  </div>

  <div class="card">
    <div class="toggle">
      <button id="btn-gasto" class="gasto" onclick="setTipo('gasto')">− Gasto</button>
      <button id="btn-ingreso" onclick="setTipo('ingreso')">+ Ingreso</button>
    </div>
    <input type="number" id="monto" placeholder="Monto" inputmode="decimal" onkeydown="if(event.key==='Enter')agregar()">
    <div class="monedas">
      <button id="btn-eur" class="sel" onclick="setMon('EUR')">€ Euros</button>
      <button id="btn-ars" onclick="setMon('ARS')">$ Pesos</button>
    </div>
    <input type="text" id="desc" placeholder="Descripción (ej: supermercado)" onkeydown="if(event.key==='Enter')agregar()">
    <button class="submit" id="submit" style="background:#e74c3c;color:#fff" onclick="agregar()">− Agregar gasto</button>
  </div>

  <div class="card">
    <div class="filters">
      <button id="f-all" class="on" onclick="setFiltro('all')">Todos</button>
      <button id="f-eur" onclick="setFiltro('EUR')">EUR</button>
      <button id="f-ars" onclick="setFiltro('ARS')">ARS</button>
    </div>
    <div id="lista"><div class="empty">Sin movimientos aún</div></div>
  </div>

  <script>
    var movs = JSON.parse(localStorage.getItem('finanzas') || '[]');
    var tipo = 'gasto', mon = 'EUR', filtro = 'all';

    function save() { localStorage.setItem('finanzas', JSON.stringify(movs)); }

    function fmt(n, cur) {
      return (cur === 'EUR' ? '€' : '$') + Number(n).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function setTipo(t) {
      tipo = t;
      document.getElementById('btn-gasto').className = t === 'gasto' ? 'gasto' : '';
      document.getElementById('btn-ingreso').className = t === 'ingreso' ? 'ingreso' : '';
      var btn = document.getElementById('submit');
      btn.style.background = t === 'gasto' ? '#e74c3c' : '#27ae60';
      btn.textContent = t === 'gasto' ? '− Agregar gasto' : '+ Agregar ingreso';
    }

    function setMon(m) {
      mon = m;
      document.getElementById('btn-eur').className = m === 'EUR' ? 'sel' : '';
      document.getElementById('btn-ars').className = m === 'ARS' ? 'sel' : '';
    }

    function setFiltro(f) {
      filtro = f;
      ['all','EUR','ARS'].forEach(function(x) {
        document.getElementById('f-' + x.toLowerCase()).className = x === f ? 'on' : '';
      });
      renderLista();
    }

    function agregar() {
      var m = parseFloat(document.getElementById('monto').value);
      if (!m || m <= 0) return;
      var d = document.getElementById('desc').value.trim() || (tipo === 'gasto' ? 'Gasto' : 'Ingreso');
      movs.unshift({ id: Date.now(), tipo: tipo, mon: mon, monto: m, desc: d, fecha: new Date().toLocaleDateString('es-AR') });
      document.getElementById('monto').value = '';
      document.getElementById('desc').value = '';
      save();
      render();
    }

    function del(id) {
      movs = movs.filter(function(m) { return m.id !== id; });
      save();
      render();
    }

    function renderBalance() {
      ['EUR','ARS'].forEach(function(cur) {
        var ing = movs.filter(function(m){ return m.tipo==='ingreso' && m.mon===cur; }).reduce(function(s,m){ return s+m.monto; }, 0);
        var egr = movs.filter(function(m){ return m.tipo==='gasto'   && m.mon===cur; }).reduce(function(s,m){ return s+m.monto; }, 0);
        var bal = ing - egr;
        var c = cur.toLowerCase();
        document.getElementById('ing-'+c).textContent = fmt(ing, cur);
        document.getElementById('egr-'+c).textContent = fmt(egr, cur);
        var el = document.getElementById('bal-'+c);
        el.textContent = (bal >= 0 ? '+' : '') + fmt(bal, cur);
        el.style.color = bal >= 0 ? '#2ecc71' : '#e74c3c';
      });
    }

    function renderLista() {
      var lista = document.getElementById('lista');
      var data = filtro === 'all' ? movs : movs.filter(function(m){ return m.mon === filtro; });
      if (!data.length) { lista.innerHTML = '<div class="empty">Sin movimientos aún</div>'; return; }
      lista.innerHTML = data.map(function(m) {
        var isI = m.tipo === 'ingreso';
        return '<div class="mov">'
          + '<div class="izq">'
          +   '<div class="desc">' + (isI ? '▲ ' : '▼ ') + m.desc + '</div>'
          +   '<div class="meta">' + m.mon + ' · ' + m.fecha + '</div>'
          + '</div>'
          + '<div class="der">'
          +   '<span class="monto" style="color:' + (isI ? '#2ecc71' : '#e74c3c') + '">'
          +     (isI ? '+' : '−') + fmt(m.monto, m.mon)
          +   '</span>'
          +   '<button class="del" onclick="del(' + m.id + ')">×</button>'
          + '</div>'
          + '</div>';
      }).join('');
    }

    function render() { renderBalance(); renderLista(); }

    render();
  </script>

</body>
</html>
